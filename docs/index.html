<script>
(function(){
  var lang = (navigator.language || '').startsWith('zh') ? 'zh' : 'en';
  function apply(l) {
    lang = l;
    document.querySelectorAll('[data-'+l+']').forEach(function(el){
      var val = el.getAttribute('data-'+l);
      if (el.tagName === 'P' || el.tagName === 'SPAN' || el.tagName === 'STRONG' || el.tagName === 'TD' || el.tagName === 'TH') el.innerHTML = val;
      else if (el.tagName === 'A') el.innerHTML = val;
      else el.innerHTML = val;
    });
    document.querySelectorAll('.lang-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.lang === l);
    });
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
  }
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.addEventListener('click', function(e){ e.preventDefault(); apply(this.dataset.lang); });
  });
  apply(lang);
})();

</script>
