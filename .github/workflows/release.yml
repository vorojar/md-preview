name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build Universal Binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/md-preview \
            target/x86_64-apple-darwin/release/md-preview \
            -output target/release/md-preview-universal

      - name: Create .app bundle
        run: |
          chmod +x bundle.sh
          bash bundle.sh

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "MD Preview" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MD Preview.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "MD-Preview-macOS-universal.dmg" \
            "target/MD Preview.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: MD-Preview-macOS-universal.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WebView2
        shell: pwsh
        run: |
          # WebView2 is pre-installed on Windows 10/11
          # Just need to build
          echo "WebView2 should be available on the runner"

      - name: Build
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/md-preview.exe dist/
          Compress-Archive -Path dist/* -DestinationPath MD-Preview-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: MD-Preview-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/md-preview dist/
          tar czf MD-Preview-linux-x64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: MD-Preview-linux-x64.tar.gz

  publish-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MD-Preview-macOS-universal.dmg
            MD-Preview-windows-x64.zip
            MD-Preview-linux-x64.tar.gz
          generate_release_notes: true
